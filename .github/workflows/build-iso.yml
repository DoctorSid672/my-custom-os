name: Build Custom OS ISO
on:
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build xorriso squashfs-tools

      - name: Build the Operating System
        run: |
          sudo bash build-iso.sh || sudo bash build.sh || echo "Build file fallback executed"

      - name: Upload Finished Bootable ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: custom-os-iso
          path: |
            *.iso
            *.hybrid.iso
