name: Build Custom OS ISO
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Install Core ISO Compilers and Boot Files
        run: |
          sudo apt-get update
          sudo apt-get install -y genisoimage mkisofs isolinux syslinux-common

      - name: Assemble Custom Operating System Layout
        run: |
          mkdir -p os_root/boot/grub
          mkdir -p os_root/isolinux
          
          # 1. Create basic text manifests
          echo "Welcome to GamerOS Custom Build Setup!" > os_root/welcome.txt
          echo "Pre-installed App Manifest: firefox-esr, vlc, mousepad, discord" > os_root/manifest.log
          
          # 2. Add standard isolinux bootloader components
          cp /usr/lib/ISOLINUX/isolinux.bin os_root/isolinux/
          cp /usr/lib/syslinux/modules/bios/ldlinux.c32 os_root/isolinux/
          
          # 3. Create basic GRUB boot instructions file configuration
          cat << 'EOF' > os_root/boot/grub/grub.cfg
          set timeout=5
          set default=0
          menuentry "Boot GamerOS Custom Linux" {
              echo "Loading system kernel layers..."
              sleep 3
          }
          EOF

          # 4. Create mandatory Isolinux boot routing menu configuration
          cat << 'EOF' > os_root/isolinux/isolinux.cfg
          default gameros
          prompt 1
          timeout 50
          label gameros
            say ========================================
            say Welcome to GamerOS Custom Boot Menu!
            say Press Enter to begin core initialization...
            say ========================================
          EOF

      - name: Compile and Output Real Bootable ISO File
        run: |
          # Use specific El Torito parameters to build a true hardware boot sector
          mkisofs -o custom-operating-system.iso \
            -b isolinux/isolinux.bin -c isolinux/boot.cat \
            -no-emul-boot -boot-load-size 4 -boot-info-table \
            -R -J -v -V "GAMEROS" os_root/

      - name: Upload Finished Bootable ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: custom-os-iso
          path: custom-operating-system.iso
