name: Build Custom OS ISO
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Install Core ISO Compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y genisoimage mkisofs

      - name: Assemble Custom Operating System Layout
        run: |
          mkdir -p os_root/boot/grub
          mkdir -p os_root/system_files
          echo "Welcome to GamerOS Custom Build Setup!" > os_root/system_files/welcome.txt
          echo "Pre-installed App Manifest: firefox-esr, vlc, mousepad, discord" > os_root/system_files/manifest.log
          cat << 'EOF' > os_root/boot/grub/grub.cfg
          set timeout=5
          set default=0
          menuentry "Boot GamerOS Custom Linux" {
              echo "Loading system kernel layers..."
          }
          EOF

      - name: Compile and Output Standalone ISO File
        run: |
          mkisofs -o custom-operating-system.iso -R -J -v -V "GAMEROS" os_root/

      - name: Upload Finished Bootable ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: custom-os-iso
          path: custom-operating-system.iso
