name: Build Custom OS ISO
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Install Core ISO Compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y genisoimage mkisofs isolinux syslinux-common linux-image-amd64

      - name: Assemble Core Linux Kernel Layout
        run: |
          mkdir -p os_root/boot/isolinux
          
          # Copy the pre-installed local kernel files directly from the host system
          cp /boot/vmlinuz* os_root/boot/vmlinuz64
          cp /boot/initrd.img* os_root/boot/corepure64.gz
          
          # Inject your custom configurations and metadata log files
          echo "Welcome to VertexOS Custom Build Setup!" > os_root/welcome.txt
          echo "Pre-installed App Manifest: firefox, vlc, mousepad, discord" > os_root/manifest.log
          
          # Add standard isolinux engine components
          cp /usr/lib/ISOLINUX/isolinux.bin os_root/boot/isolinux/
          cp /usr/lib/syslinux/modules/bios/ldlinux.c32 os_root/boot/isolinux/
          
          # Create a bulletproof boot instruction configuration file
          cat << 'EOF' > os_root/boot/isolinux/isolinux.cfg
          default gameros
          prompt 0
          timeout 10
          label gameros
            kernel /boot/vmlinuz64
            append initrd=/boot/corepure64.gz loglevel=3 cgroup_disable=memory
          EOF

      - name: Compile and Output Real Bootable ISO File
        run: |
          mkisofs -o custom-operating-system.iso \
            -b boot/isolinux/isolinux.bin -c boot/isolinux/boot.cat \
            -no-emul-boot -boot-load-size 4 -boot-info-table \
            -R -J -v -V "VertexOS" os_root/

      - name: Upload Finished Bootable ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: custom-os-iso
          path: custom-operating-system.iso
